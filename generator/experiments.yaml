# Factorial design: guidance_scale × mask_blur (steps fixed at 35)
# Usage: python run.py batch --config experiments.yaml

input: backgrounds/
base_output: results_PLOCAN_backgrounds/

model: fill
classes: [0, 1, 2, 3, 4, 5]
num_instances: 2
max_images: 7
water_method: sam
min_water_coverage: 0.40
crop: false
lighting: midday

experiments:
  - name: A
    guidance_scale: 10
    steps: 35
    mask_blur: 0
  - name: B
    guidance_scale: 10
    steps: 35
    mask_blur: 20
  - name: C
    guidance_scale: 14
    steps: 35
    mask_blur: 0
  - name: D
    guidance_scale: 14
    steps: 35
    mask_blur: 20
  - name: E
    guidance_scale: 18
    steps: 35
    mask_blur: 0
  - name: F
    guidance_scale: 18
    steps: 35
    mask_blur: 20
